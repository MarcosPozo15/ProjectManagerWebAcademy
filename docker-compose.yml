services:
  postgres:
    image: postgres:16
    container_name: pmwa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pmwa
      POSTGRES_PASSWORD: pmwa
      POSTGRES_DB: pmwa
    ports:
      - "5432:5432"
    volumes:
      - pmwa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: pmwa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pmwa_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: pmwa_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pmwa_minio_data:/data

volumes:
  pmwa_postgres_data:
  pmwa_redis_data:
  pmwa_minio_data:
